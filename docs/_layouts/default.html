<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.75;
      color: #1e293b;
      background: #f8fafc;
    }

    .page-wrapper {
      max-width: 740px;
      margin: 0 auto;
      padding: 56px 24px 96px;
    }

    /* Header */
    .profile-header {
      margin-bottom: 52px;
    }
    .profile-header h1 {
      font-size: 1.875rem;
      font-weight: 600;
      color: #0f172a;
      margin: 0 0 4px;
      letter-spacing: -0.02em;
    }
    .profile-tagline {
      color: #64748b;
      font-size: 0.9375rem;
      margin: 0 0 20px;
    }
    .sns-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .sns-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #475569;
      text-decoration: none;
      font-size: 0.8125rem;
      padding: 5px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      background: #fff;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .sns-link:hover {
      border-color: #6366f1;
      color: #6366f1;
      background: #f5f3ff;
    }
    .sns-link i { font-size: 13px; }

    /* Section */
    .section {
      margin-bottom: 44px;
    }
    .section h2 {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #6366f1;
      margin: 0 0 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid #e2e8f0;
    }

    /* About */
    .about-text {
      color: #334155;
      margin: 0;
    }

    /* OSS grid */
    .oss-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 10px;
    }
    .oss-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 14px 16px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .oss-card:hover {
      border-color: #6366f1;
      box-shadow: 0 2px 10px rgba(99,102,241,0.1);
    }
    .oss-card-title {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
      font-size: 0.875rem;
      color: #1e293b;
      text-decoration: none;
    }
    .oss-card-title:hover { color: #6366f1; }
    .oss-card-title i { font-size: 13px; color: #94a3b8; }
    .oss-desc {
      font-size: 0.8rem;
      color: #64748b;
      margin: 5px 0 0;
    }

    /* Item list (papers, talks, events) */
    .item-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .item-list li {
      display: flex;
      gap: 16px;
      padding: 11px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .item-list li:last-child { border-bottom: none; }
    .item-year {
      flex: 0 0 54px;
      font-size: 0.75rem;
      color: #94a3b8;
      padding-top: 3px;
      font-variant-numeric: tabular-nums;
    }
    .item-body { flex: 1; min-width: 0; }
    .item-title {
      font-weight: 500;
      color: #1e293b;
      font-size: 0.9rem;
    }
    .item-title a {
      color: inherit;
      text-decoration: none;
    }
    .item-title a:hover { color: #6366f1; }
    .item-sub {
      font-size: 0.8125rem;
      color: #64748b;
      margin-top: 2px;
    }
    .tag {
      display: inline-block;
      font-size: 0.6875rem;
      padding: 1px 8px;
      border-radius: 99px;
      background: #f1f5f9;
      color: #475569;
      margin-top: 5px;
      margin-right: 3px;
    }

    @media (max-width: 600px) {
      .page-wrapper { padding: 36px 18px 72px; }
      .profile-header h1 { font-size: 1.5rem; }
      .oss-grid { grid-template-columns: 1fr 1fr; }
      .item-year { flex: 0 0 46px; }
    }
    @media (max-width: 400px) {
      .oss-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    {{ content }}
  </div>
</body>
</html>
